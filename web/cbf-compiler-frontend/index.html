
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CBF compiler and viewer</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="markdown.css" />


</head>
<body>
<div id="app">
  <h1 style="border: none">Online CBF font compiler</h1>

  <nav class="tab-bar">
    <button data-tab="font-compiler-section">Font Compiler</button>
    <button data-tab="font-viewer-section">Font Viewer</button>
    <button data-tab="docs-and-guides-section">Docs & Guides</button>
  </nav>

<!--  <section id="font-compiler-section" class="tab-section active">-->
  <section id="font-compiler-section" class="tab-section">
    <div class="content">
      <h1> Upload your font assets here </h1>

      Please see <span style="background: #30363d; padding:6px; border-radius: 4px;">Docs & Guides</span> for
      details on the source files for generating your font.

      <form id="fontForm" >
      <div class="info">
        <label for="pngInput">Font source image with glyphs (a PNG file)</label><br />
        <input type="file" id="pngInput" accept=".png" required />
      </div>
      <div class="info">
        <label for="jsonInput">Font configuration (a JSON file)</label><br />
        <input type="file" id="jsonInput" accept=".json" required />
      </div>
      <div class="form-actions">
        <button type="submit">Upload</button>
      </div>
    </form>
    <div id="formMessage" class="info" style="display: none;"></div>
    </div>
  </section>

  <section id="font-viewer-section" class="tab-section active">

    <div class="content">

      <div class="container">
        <div class="col left"><h1>CBF Font Viewer</h1></div>
        <div class="col right">
          <div class="info">CBF = Compact Bitmap Font. Such fonts are tiny, often less than 1 kilobyte in size!</div>
        </div>
      </div>




      <label>Font:
        <select id="fontSelect">
          <option value="cc_red_alert_inet.cbf">cc_red_alert_inet.cbf</option>
          <option value="cc_red_alert_lan.cbf">cc_red_alert_lan.cbf</option>
        </select>
      </label><br/>

      <label>Scale:
        <select id="scaleSelect">
          <option value="1">1x</option>
          <option value="2" selected>2x</option>
          <option value="3">3x</option>
          <option value="4">4x</option>
          <option value="5">5x</option>
          <option value="6">6x</option>
          <option value="7">7x</option>
          <option value="8">8x</option>
        </select>
      </label><br/>

      <label>Text:
        <input type="text" id="inputText" maxlength="80" value="Hi! Welcome to the online CBF font viewer!" />
      </label><br/>

      <pre id="metadata"></pre>
      <canvas id="canvas" width="800" height="600"></canvas>


    </div>
  </section>



  <section id="docs-and-guides-section" class="tab-section">
<!--  <section id="docs-and-guides-section" class="tab-section active">-->
    <div class="content">
      <div id="markdown-container"></div>
    </div>

  </section>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
